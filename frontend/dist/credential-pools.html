<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>凭证池 - NO-CRM</title>
  <link rel="stylesheet" href="https://unpkg.com/tdesign-vue-next/dist/tdesign.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background-color: #f5f7fa;
    }
    .header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 {
      font-size: 24px;
      font-weight: 600;
    }
    .header .back-link {
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      transition: background 0.3s;
    }
    .header .back-link:hover {
      background: rgba(255, 255, 255, 0.3);
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px;
    }
    .stats-card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
    }
    .stat-item {
      text-align: center;
      padding: 15px;
      border-radius: 8px;
    }
    .stat-item.total {
      background: #f0f2ff;
    }
    .stat-item.normal {
      background: #e6f7ff;
    }
    .stat-item.warning {
      background: #fffbe6;
    }
    .stat-item.expired {
      background: #fff1f0;
    }
    .stat-value {
      font-size: 32px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .stat-item.total .stat-value { color: #667eea; }
    .stat-item.normal .stat-value { color: #1890ff; }
    .stat-item.warning .stat-value { color: #faad14; }
    .stat-item.expired .stat-value { color: #f5222d; }
    .stat-label {
      font-size: 14px;
      color: #666;
    }
    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .filter-group {
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .filter-group select,
    .filter-group input {
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 14px;
    }
    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #667eea;
      color: white;
    }
    .btn-primary:hover {
      background: #5a6fd6;
    }
    .btn-danger {
      background: #f5222d;
      color: white;
    }
    .btn-danger:hover {
      background: #d91019;
    }
    .btn-default {
      background: white;
      border: 1px solid #d9d9d9;
      color: #333;
    }
    .btn-default:hover {
      border-color: #667eea;
      color: #667eea;
    }
    .table-container {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead {
      background: #fafafa;
    }
    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }
    th {
      font-weight: 600;
      color: #333;
    }
    tr:hover {
      background: #fafafa;
    }
    .status-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
    }
    .status-normal {
      background: #e6f7ff;
      color: #1890ff;
    }
    .status-warning {
      background: #fffbe6;
      color: #faad14;
    }
    .status-expired {
      background: #fff1f0;
      color: #f5222d;
    }
    .action-group {
      display: flex;
      gap: 8px;
    }
    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 4px 8px;
      border-radius: 4px;
      transition: background 0.3s;
    }
    .action-btn.edit {
      color: #1890ff;
    }
    .action-btn.edit:hover {
      background: #e6f7ff;
    }
    .action-btn.delete {
      color: #f5222d;
    }
    .action-btn.delete:hover {
      background: #fff1f0;
    }
    .action-btn.view-secret {
      color: #667eea;
    }
    .action-btn.view-secret:hover {
      background: #f0f2ff;
    }
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: white;
      border-radius: 8px;
      width: 500px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-header {
      padding: 16px 24px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 {
      font-size: 18px;
      font-weight: 600;
    }
    .modal-close {
      background: none;
      border: none;
      font-size: 24px;
      cursor: pointer;
      color: #999;
    }
    .modal-body {
      padding: 24px;
    }
    .modal-footer {
      padding: 16px 24px;
      border-top: 1px solid #f0f0f0;
      display: flex;
      justify-content: flex-end;
      gap: 12px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
      color: #333;
    }
    .form-group label .required {
      color: #f5222d;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 14px;
      transition: border-color 0.3s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #667eea;
    }
    .form-group textarea {
      resize: vertical;
      min-height: 80px;
    }
    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .secret-display {
      background: #f5f5f5;
      padding: 12px;
      border-radius: 4px;
      font-family: monospace;
      word-break: break-all;
      margin-top: 8px;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }
    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 16px;
    }
    .pagination {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 8px;
      padding: 16px;
      border-top: 1px solid #f0f0f0;
    }
    .pagination button {
      padding: 6px 12px;
      border: 1px solid #d9d9d9;
      background: white;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }
    .pagination button.active {
      background: #667eea;
      color: white;
      border-color: #667eea;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #999;
    }
    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      padding: 12px 24px;
      border-radius: 4px;
      color: white;
      font-size: 14px;
      z-index: 2000;
      display: none;
    }
    .toast.active {
      display: block;
    }
    .toast.success {
      background: #52c41a;
    }
    .toast.error {
      background: #f5222d;
    }
    .breadcrumb {
      padding: 12px 0;
      color: #666;
      font-size: 14px;
    }
    .breadcrumb a {
      color: #667eea;
      text-decoration: none;
    }
    .breadcrumb span {
      margin: 0 8px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔐 凭证池管理</h1>
    <a href="/" class="back-link">← 返回主系统</a>
  </div>

  <div class="container">
    <div class="breadcrumb">
      <a href="/">首页</a>
      <span>/</span>
      <span>凭证池</span>
    </div>

    <div class="stats-card" id="statsCard" style="display: none;">
      <div class="stats-grid">
        <div class="stat-item total">
          <div class="stat-value" id="totalCount">0</div>
          <div class="stat-label">总凭证数</div>
        </div>
        <div class="stat-item normal">
          <div class="stat-value" id="normalCount">0</div>
          <div class="stat-label">正常</div>
        </div>
        <div class="stat-item warning">
          <div class="stat-value" id="warningCount">0</div>
          <div class="stat-label">快过期</div>
        </div>
        <div class="stat-item expired">
          <div class="stat-value" id="expiredCount">0</div>
          <div class="stat-label">已过期</div>
        </div>
      </div>
    </div>

    <div class="toolbar">
      <div class="filter-group">
        <select id="statusFilter">
          <option value="">全部状态</option>
          <option value="normal">正常</option>
          <option value="warning">快过期</option>
          <option value="expired">已过期</option>
        </select>
        <select id="thirdPartyFilter">
          <option value="">全部第三方</option>
        </select>
        <input type="text" id="searchInput" placeholder="搜索账号/用途/负责人...">
        <button class="btn btn-default" id="searchBtn">搜索</button>
        <button class="btn btn-default" id="resetBtn">重置</button>
      </div>
      <button class="btn btn-primary" id="addBtn">+ 新增凭证</button>
    </div>

    <div class="table-container">
      <div class="loading" id="loading">加载中...</div>
      <div class="empty-state" id="emptyState" style="display: none;">
        <div class="icon">📋</div>
        <p>暂无凭证数据</p>
        <p style="margin-top: 8px; font-size: 12px;">点击"新增凭证"开始添加</p>
      </div>
      <table id="dataTable" style="display: none;">
        <thead>
          <tr>
            <th style="width: 80px;">状态</th>
            <th style="width: 120px;">第三方平台</th>
            <th style="width: 150px;">账号</th>
            <th style="width: 100px;">密钥</th>
            <th style="width: 120px;">有效期</th>
            <th style="width: 150px;">用途</th>
            <th style="width: 100px;">负责人</th>
            <th style="width: 180px;">操作</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="pagination" id="pagination" style="display: none;">
        <button id="prevBtn">上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button id="nextBtn">下一页</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="formModal">
    <div class="modal">
      <div class="modal-header">
        <h2 id="modalTitle">新增凭证</h2>
        <button class="modal-close" id="closeModal">&times;</button>
      </div>
      <div class="modal-body">
        <form id="credentialForm">
          <div class="form-group">
            <label><span class="required">*</span> 第三方平台</label>
            <input type="text" id="thirdParty" name="thirdParty" placeholder="如：微信支付、阿里云、某开放平台" required>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>账号</label>
              <input type="text" id="account" name="account" placeholder="账号/AppID">
            </div>
            <div class="form-group">
              <label>密钥</label>
              <input type="text" id="secret" name="secret" placeholder="密钥/Secret">
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>有效期</label>
              <input type="date" id="expireDate" name="expireDate">
            </div>
            <div class="form-group">
              <label>负责人</label>
              <input type="text" id="responsiblePerson" name="responsiblePerson" placeholder="负责人姓名">
            </div>
          </div>
          <div class="form-group">
            <label>用途</label>
            <textarea id="purpose" name="purpose" placeholder="描述凭证的用途"></textarea>
          </div>
          <div class="form-group">
            <label>回调地址</label>
            <input type="text" id="callbackUrl" name="callbackUrl" placeholder="回调URL">
          </div>
          <div class="form-group">
            <label>备注</label>
            <textarea id="remarks" name="remarks" placeholder="其他备注信息"></textarea>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="cancelBtn">取消</button>
        <button class="btn btn-primary" id="saveBtn">保存</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="secretModal">
    <div class="modal">
      <div class="modal-header">
        <h2>查看密钥</h2>
        <button class="modal-close" id="closeSecretModal">&times;</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>平台</label>
          <div id="secretThirdParty" class="secret-display">-</div>
        </div>
        <div class="form-group">
          <label>账号</label>
          <div id="secretAccount" class="secret-display">-</div>
        </div>
        <div class="form-group">
          <label>密钥</label>
          <div id="secretValue" class="secret-display">-</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="closeSecretBtn">关闭</button>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="deleteModal">
    <div class="modal">
      <div class="modal-header">
        <h2>确认删除</h2>
        <button class="modal-close" id="closeDeleteModal">&times;</button>
      </div>
      <div class="modal-body">
        <p>确定要删除此凭证吗？此操作不可恢复。</p>
      </div>
      <div class="modal-footer">
        <button class="btn btn-default" id="cancelDeleteBtn">取消</button>
        <button class="btn btn-danger" id="confirmDeleteBtn">删除</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const API_BASE = '/api/credential-pools';
    const AUTH_BASE = '/api/auth';
    
    let token = localStorage.getItem('token');
    let currentPage = 1;
    let pageSize = 10;
    let currentEditId = null;
    let currentDeleteId = null;
    let thirdParties = [];

    async function request(url, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        ...options.headers
      };
      if (token) {
        headers['Authorization'] = `Bearer ${token}`;
      }
      
      const response = await fetch(url, {
        ...options,
        headers
      });
      
      if (response.status === 401) {
        showToast('登录已过期，请先登录', 'error');
        setTimeout(() => {
          window.location.href = '/login';
        }, 1500);
        throw new Error('Unauthorized');
      }
      
      const data = await response.json();
      if (!response.ok) {
        throw new Error(data.message || '请求失败');
      }
      return data;
    }

    function showToast(message, type = 'success') {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.className = `toast ${type} active`;
      setTimeout(() => {
        toast.classList.remove('active');
      }, 3000);
    }

    function getStatusClass(status) {
      switch (status) {
        case 'normal': return 'status-normal';
        case 'warning': return 'status-warning';
        case 'expired': return 'status-expired';
        default: return 'status-normal';
      }
    }

    function getStatusText(status) {
      switch (status) {
        case 'normal': return '正常';
        case 'warning': return '快过期';
        case 'expired': return '已过期';
        default: return '正常';
      }
    }

    function formatDate(dateStr) {
      if (!dateStr) return '-';
      return dateStr;
    }

    function maskSecret(secret) {
      if (!secret) return '-';
      if (secret.length <= 4) return '****';
      return secret.substring(0, 2) + '****' + secret.substring(secret.length - 2);
    }

    async function loadStats() {
      try {
        const stats = await request(`${API_BASE}/statistics/overview`);
        document.getElementById('totalCount').textContent = stats.total || 0;
        document.getElementById('normalCount').textContent = stats.normal || 0;
        document.getElementById('warningCount').textContent = stats.warning || 0;
        document.getElementById('expiredCount').textContent = stats.expired || 0;
        document.getElementById('statsCard').style.display = 'block';
      } catch (e) {
        console.error('加载统计失败:', e);
      }
    }

    async function loadThirdParties() {
      try {
        thirdParties = await request(`${API_BASE}/third-parties/list`) || [];
        const select = document.getElementById('thirdPartyFilter');
        select.innerHTML = '<option value="">全部第三方</option>';
        thirdParties.forEach(p => {
          const option = document.createElement('option');
          option.value = p;
          option.textContent = p;
          select.appendChild(option);
        });
      } catch (e) {
        console.error('加载第三方列表失败:', e);
      }
    }

    async function loadData() {
      const loading = document.getElementById('loading');
      const emptyState = document.getElementById('emptyState');
      const dataTable = document.getElementById('dataTable');
      const pagination = document.getElementById('pagination');
      
      loading.style.display = 'block';
      emptyState.style.display = 'none';
      dataTable.style.display = 'none';
      pagination.style.display = 'none';

      try {
        const statusFilter = document.getElementById('statusFilter').value;
        const thirdPartyFilter = document.getElementById('thirdPartyFilter').value;
        const searchValue = document.getElementById('searchInput').value.trim();

        let url = `${API_BASE}?page=${currentPage}&pageSize=${pageSize}`;
        if (statusFilter) url += `&status=${encodeURIComponent(statusFilter)}`;
        if (thirdPartyFilter) url += `&thirdParty=${encodeURIComponent(thirdPartyFilter)}`;

        const result = await request(url);
        let items = result.items || result.data || result || [];
        
        if (searchValue) {
          const lowerSearch = searchValue.toLowerCase();
          items = items.filter(item => 
            (item.account && item.account.toLowerCase().includes(lowerSearch)) ||
            (item.purpose && item.purpose.toLowerCase().includes(lowerSearch)) ||
            (item.responsiblePerson && item.responsiblePerson.toLowerCase().includes(lowerSearch))
          );
        }

        loading.style.display = 'none';

        if (items.length === 0) {
          emptyState.style.display = 'block';
          return;
        }

        dataTable.style.display = 'table';
        const tableBody = document.getElementById('tableBody');
        tableBody.innerHTML = '';

        items.forEach(item => {
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><span class="status-badge ${getStatusClass(item.status)}">${getStatusText(item.status)}</span></td>
            <td>${item.thirdParty || '-'}</td>
            <td>${item.account || '-'}</td>
            <td>${maskSecret(item.maskedSecret || item.secret)}</td>
            <td>${formatDate(item.expireDate)}</td>
            <td>${item.purpose || '-'}</td>
            <td>${item.responsiblePerson || '-'}</td>
            <td>
              <div class="action-group">
                <button class="action-btn view-secret" data-id="${item.id}" title="查看密钥">👁 密钥</button>
                <button class="action-btn edit" data-id="${item.id}">✏️ 编辑</button>
                <button class="action-btn delete" data-id="${item.id}">🗑 删除</button>
              </div>
            </td>
          `;
          tableBody.appendChild(tr);
        });

        const total = result.total || items.length;
        const totalPages = Math.ceil(total / pageSize);
        document.getElementById('pageInfo').textContent = `第 ${currentPage} 页 / 共 ${totalPages} 页 (${total} 条)`;
        document.getElementById('prevBtn').disabled = currentPage <= 1;
        document.getElementById('nextBtn').disabled = currentPage >= totalPages;
        
        if (totalPages > 1) {
          pagination.style.display = 'flex';
        }

        bindTableActions();
      } catch (e) {
        loading.style.display = 'none';
        console.error('加载数据失败:', e);
        showToast('加载数据失败: ' + e.message, 'error');
      }
    }

    function bindTableActions() {
      document.querySelectorAll('.action-btn.view-secret').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          try {
            const secretData = await request(`${API_BASE}/${id}/secret`);
            const credential = await request(`${API_BASE}/${id}`);
            document.getElementById('secretThirdParty').textContent = credential.thirdParty || '-';
            document.getElementById('secretAccount').textContent = credential.account || '-';
            document.getElementById('secretValue').textContent = secretData.secret || '-';
            document.getElementById('secretModal').classList.add('active');
          } catch (e) {
            showToast('获取密钥失败: ' + e.message, 'error');
          }
        });
      });

      document.querySelectorAll('.action-btn.edit').forEach(btn => {
        btn.addEventListener('click', async () => {
          currentEditId = btn.dataset.id;
          try {
            const credential = await request(`${API_BASE}/${currentEditId}`);
            document.getElementById('modalTitle').textContent = '编辑凭证';
            document.getElementById('thirdParty').value = credential.thirdParty || '';
            document.getElementById('account').value = credential.account || '';
            document.getElementById('secret').value = credential.secret || '';
            document.getElementById('expireDate').value = credential.expireDate || '';
            document.getElementById('responsiblePerson').value = credential.responsiblePerson || '';
            document.getElementById('purpose').value = credential.purpose || '';
            document.getElementById('callbackUrl').value = credential.callbackUrl || '';
            document.getElementById('remarks').value = credential.remarks || '';
            document.getElementById('formModal').classList.add('active');
          } catch (e) {
            showToast('获取凭证详情失败: ' + e.message, 'error');
          }
        });
      });

      document.querySelectorAll('.action-btn.delete').forEach(btn => {
        btn.addEventListener('click', () => {
          currentDeleteId = btn.dataset.id;
          document.getElementById('deleteModal').classList.add('active');
        });
      });
    }

    async function checkAuth() {
      if (!token) {
        showToast('请先登录', 'error');
        setTimeout(() => {
          window.location.href = '/login';
        }, 1500);
        return false;
      }
      return true;
    }

    async function init() {
      const hasAuth = await checkAuth();
      if (!hasAuth) return;

      await loadStats();
      await loadThirdParties();
      await loadData();
    }

    document.getElementById('addBtn').addEventListener('click', () => {
      currentEditId = null;
      document.getElementById('modalTitle').textContent = '新增凭证';
      document.getElementById('credentialForm').reset();
      document.getElementById('formModal').classList.add('active');
    });

    document.getElementById('closeModal').addEventListener('click', () => {
      document.getElementById('formModal').classList.remove('active');
    });

    document.getElementById('cancelBtn').addEventListener('click', () => {
      document.getElementById('formModal').classList.remove('active');
    });

    document.getElementById('saveBtn').addEventListener('click', async () => {
      const thirdParty = document.getElementById('thirdParty').value.trim();
      if (!thirdParty) {
        showToast('请填写第三方平台', 'error');
        return;
      }

      const data = {
        thirdParty: thirdParty,
        account: document.getElementById('account').value.trim(),
        secret: document.getElementById('secret').value.trim(),
        expireDate: document.getElementById('expireDate').value,
        responsiblePerson: document.getElementById('responsiblePerson').value.trim(),
        purpose: document.getElementById('purpose').value.trim(),
        callbackUrl: document.getElementById('callbackUrl').value.trim(),
        remarks: document.getElementById('remarks').value.trim()
      };

      try {
        if (currentEditId) {
          await request(`${API_BASE}/${currentEditId}`, {
            method: 'PATCH',
            body: JSON.stringify(data)
          });
          showToast('更新成功');
        } else {
          await request(API_BASE, {
            method: 'POST',
            body: JSON.stringify(data)
          });
          showToast('添加成功');
        }
        
        document.getElementById('formModal').classList.remove('active');
        await loadStats();
        await loadThirdParties();
        await loadData();
      } catch (e) {
        showToast('保存失败: ' + e.message, 'error');
      }
    });

    document.getElementById('closeSecretModal').addEventListener('click', () => {
      document.getElementById('secretModal').classList.remove('active');
    });

    document.getElementById('closeSecretBtn').addEventListener('click', () => {
      document.getElementById('secretModal').classList.remove('active');
    });

    document.getElementById('closeDeleteModal').addEventListener('click', () => {
      document.getElementById('deleteModal').classList.remove('active');
    });

    document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
      document.getElementById('deleteModal').classList.remove('active');
    });

    document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
      try {
        await request(`${API_BASE}/${currentDeleteId}`, {
          method: 'DELETE'
        });
        showToast('删除成功');
        document.getElementById('deleteModal').classList.remove('active');
        await loadStats();
        await loadThirdParties();
        await loadData();
      } catch (e) {
        showToast('删除失败: ' + e.message, 'error');
      }
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
      currentPage = 1;
      loadData();
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('statusFilter').value = '';
      document.getElementById('thirdPartyFilter').value = '';
      document.getElementById('searchInput').value = '';
      currentPage = 1;
      loadData();
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
      if (currentPage > 1) {
        currentPage--;
        loadData();
      }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
      currentPage++;
      loadData();
    });

    document.querySelectorAll('.modal-overlay').forEach(overlay => {
      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.classList.remove('active');
        }
      });
    });

    init();
  </script>
</body>
</html>
